cv:
  name: Hyunseung Hwang
  label: "Incoming Postdoctoral Researcher · NYU Center for Responsible AI"
  email: aguno94@gmail.com
  location: Daejeon, South Korea
  image: ""
  summary: "Incoming postdoctoral researcher at NYU's Center for Responsible AI (with Julia Stoyanovich) and a 2026 KAIST Ph.D. My research stress-tests the explanation methods used to audit high-stakes models, showing that tools like SHAP are sensitive to data-engineering choices and to internal randomness, with direct implications for fairness, model risk, and trustworthy ML in domains such as credit and lending. I work on responsible AI, model transparency, and the robustness of AI systems, in both research and applied industry settings."

